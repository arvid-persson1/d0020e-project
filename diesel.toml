# For documentation on how to configure this file,
# see https://diesel.rs/guides/configuring-diesel-cli

[print_schema]
file = "src/postgres/schema.rs"
generate_missing_sql_type_definitions = true
custom_type_derives = ["std::fmt::Debug", "diesel::query_builder::QueryId", "diesel::sql_types::SqlType"]
import_types = ["diesel::sql_types::Varchar"]
with_docs = true

[migrations_directory]
dir = "migrations"
